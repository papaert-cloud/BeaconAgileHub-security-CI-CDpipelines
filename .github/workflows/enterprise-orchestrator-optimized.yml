name: 🚀 Enterprise DevSecOps Master Orchestrator (DRY Optimized)

# 🎆 ENHANCED VERSION: DRY, Environment-Friendly, OIDC-Ready
# Comprehensive DevSecOps orchestration with centralized configuration

on:
  push:
    branches: [main, develop, release/*]
    paths:
      - '.github/workflows/**'
      - 'terraform/**'
      - 'app/**'
      - 'scripts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - 'terraform/**'
      - 'app/**'
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'dev'
        type: choice
        options: ['dev', 'staging', 'production']
      deployment_strategy:
        description: 'Deployment Strategy'
        required: true
        default: 'rolling'
        type: choice
        options: ['rolling', 'blue-green', 'canary']
      skip_security:
        description: 'Skip Security Gates (Emergency Only)'
        required: false
        default: false
        type: boolean
      force_compliance:
        description: 'Force Compliance Validation'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable Debug Logging'
        required: false
        default: false
        type: boolean

concurrency:
  group: enterprise-orchestrator-${{ github.ref }}
  cancel-in-progress: true

# 🌍 DRY ENVIRONMENT CONFIGURATION
env:
  # AWS Configuration (OIDC Ready)
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::005965605891:role/GitHubActionsRole' }}
  
  # Terraform Configuration
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.6.6' }}
  TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
  TF_VAR_deployment_strategy: ${{ github.event.inputs.deployment_strategy || 'rolling' }}
  
  # Security Configuration
  SECURITY_SEVERITY_THRESHOLD: ${{ vars.SECURITY_SEVERITY_THRESHOLD || 'medium' }}
  FAIL_ON_SECURITY: ${{ vars.FAIL_ON_SECURITY || 'false' }}
  ENABLE_SBOM: ${{ vars.ENABLE_SBOM || 'true' }}
  
  # Monitoring & EDA Configuration
  EDA_ENDPOINT: ${{ vars.EDA_ENDPOINT || 'http://148.230.94.85:5000/security-alert' }}
  GRAFANA_ENDPOINT: ${{ vars.GRAFANA_ENDPOINT || 'http://148.230.94.85:3000' }}
  PROMETHEUS_ENDPOINT: ${{ vars.PROMETHEUS_ENDPOINT || 'http://148.230.94.85:9091' }}
  
  # Repository Configuration
  REPOSITORY_NAME: ${{ github.repository }}
  BRANCH_NAME: ${{ github.ref_name }}
  WORKFLOW_RUN_ID: ${{ github.run_id }}
  
  # Debugging
  ACTIONS_RUNNER_DEBUG: ${{ github.event.inputs.debug_mode || 'false' }}
  ACTIONS_STEP_DEBUG: ${{ github.event.inputs.debug_mode || 'false' }}

permissions:
  id-token: write      # Required for OIDC
  contents: read       # Required for checkout
  security-events: write # Required for security findings
  actions: read        # Required for workflow status
  checks: write        # Required for check runs
  pull-requests: write # Required for PR comments
  issues: write        # Required for issue creation
  packages: write      # Required for container registry

jobs:
  # 🎆 PHASE 1: ORCHESTRATION CONTROL
  orchestration-control:
    name: "🎆 Orchestration Control Platform"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      deployment_strategy: ${{ steps.env.outputs.deployment_strategy }}
      security_required: ${{ steps.env.outputs.security_required }}
      compliance_required: ${{ steps.env.outputs.compliance_required }}
      cost_threshold: ${{ steps.env.outputs.cost_threshold }}
      aws_role_arn: ${{ steps.env.outputs.aws_role_arn }}
      monitoring_enabled: ${{ steps.env.outputs.monitoring_enabled }}
      
    steps:
      - name: "📋 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: "🌍 Environment & Strategy Configuration"
        id: env
        run: |
          # Determine environment with precedence: dispatch > branch > default
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENVIRONMENT="production"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            ENVIRONMENT="staging"
          else
            ENVIRONMENT="dev"
          fi
          
          # Determine deployment strategy
          if [[ "${{ github.event.inputs.deployment_strategy }}" != "" ]]; then
            STRATEGY="${{ github.event.inputs.deployment_strategy }}"
          else
            case $ENVIRONMENT in
              production) STRATEGY="blue-green" ;;
              staging) STRATEGY="canary" ;;
              *) STRATEGY="rolling" ;;
            esac
          fi
          
          # Security requirements
          if [[ "${{ github.event.inputs.skip_security }}" == "true" ]]; then
            SECURITY_REQUIRED="false"
          else
            SECURITY_REQUIRED="true"
          fi
          
          # Compliance requirements
          if [[ "$ENVIRONMENT" == "production" ]] || [[ "${{ github.event.inputs.force_compliance }}" == "true" ]]; then
            COMPLIANCE_REQUIRED="true"
          else
            COMPLIANCE_REQUIRED="false"
          fi
          
          # Cost thresholds by environment
          case $ENVIRONMENT in
            production) COST_THRESHOLD="1000" ;;
            staging) COST_THRESHOLD="500" ;;
            *) COST_THRESHOLD="100" ;;
          esac
          
          # AWS Role ARN (OIDC)
          AWS_ROLE_ARN="${{ env.AWS_ROLE_ARN }}"
          
          # Monitoring enabled
          MONITORING_ENABLED="true"
          
          # Output all configurations
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "deployment_strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "security_required=$SECURITY_REQUIRED" >> $GITHUB_OUTPUT
          echo "compliance_required=$COMPLIANCE_REQUIRED" >> $GITHUB_OUTPUT
          echo "cost_threshold=$COST_THRESHOLD" >> $GITHUB_OUTPUT
          echo "aws_role_arn=$AWS_ROLE_ARN" >> $GITHUB_OUTPUT
          echo "monitoring_enabled=$MONITORING_ENABLED" >> $GITHUB_OUTPUT
          
          # Debug output
          echo "🎯 Configuration Summary:"
          echo "  Environment: $ENVIRONMENT"
          echo "  Strategy: $STRATEGY"
          echo "  Security Required: $SECURITY_REQUIRED"
          echo "  Compliance Required: $COMPLIANCE_REQUIRED"
          echo "  Cost Threshold: $COST_THRESHOLD"
          echo "  AWS Role ARN: $AWS_ROLE_ARN"
          echo "  Monitoring: $MONITORING_ENABLED"
          
      - name: "📊 Configure Monitoring Integration"
        run: |
          echo "📈 Configuring monitoring endpoints..."
          echo "EDA Endpoint: $EDA_ENDPOINT"
          echo "Grafana Endpoint: $GRAFANA_ENDPOINT"
          echo "Prometheus Endpoint: $PROMETHEUS_ENDPOINT"
          
          # Send workflow start event to EDA
          curl -X POST "$EDA_ENDPOINT" \
            -H 'Content-Type: application/json' \
            -H 'User-Agent: GitHub-Actions-Orchestrator/1.0' \
            -d '{
              "severity": "info",
              "summary": "Enterprise orchestrator started",
              "source": "github-actions-orchestrator",
              "environment": "'${{ steps.env.outputs.environment }}'",
              "repository": "'${{ github.repository }}'",
              "workflow_url": "'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'",
              "deployment_strategy": "'${{ steps.env.outputs.deployment_strategy }}'"
            }' || echo "⚠️ EDA notification failed (non-blocking)"

  # 🛡️ PHASE 2: SECURITY ORCHESTRATION
  security-orchestration:
    name: "🛡️ Security Orchestration Matrix"
    needs: orchestration-control
    if: needs.orchestration-control.outputs.security_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        security_tool: ['kics', 'checkov', 'trivy', 'semgrep']
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
      - name: "📋 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: "🌐 Configure AWS OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.orchestration-control.outputs.aws_role_arn }}
          role-session-name: security-scan-${{ matrix.security_tool }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: "🛡️ Run Security Tool: ${{ matrix.security_tool }}"
        run: |
          echo "🛡️ Running ${{ matrix.security_tool }} security scan..."
          
          case "${{ matrix.security_tool }}" in
            "kics")
              docker run --rm -v $PWD:/path checkmarx/kics:latest scan \
                -p /path \
                --report-formats json,sarif \
                --output-path /path/kics-results
              ;;
            "checkov")
              docker run --rm -v $PWD:/tf bridgecrew/checkov:latest \
                --framework terraform \
                --output json \
                --output-file-path /tf/checkov-results.json \
                /tf
              ;;
            "trivy")
              docker run --rm -v $PWD:/workspace aquasec/trivy:latest \
                fs /workspace \
                --format json \
                --output /workspace/trivy-results.json
              ;;
            "semgrep")
              docker run --rm -v $PWD:/src returntocorp/semgrep:latest \
                --config=auto \
                --json \
                --output=/src/semgrep-results.json \
                /src
              ;;
          esac
          
      - name: "📊 Upload Security Results to S3"
        run: |
          # Upload security scan results to S3 for centralized analysis
          RESULTS_PATH="security-results/${{ needs.orchestration-control.outputs.environment }}/${{ github.run_id }}"
          
          aws s3 cp ${{ matrix.security_tool }}-results* \
            s3://${{ vars.SECURITY_RESULTS_BUCKET || 'devsecops-security-findings' }}/$RESULTS_PATH/ \
            --recursive || echo "⚠️ S3 upload failed (non-blocking)"
            
      - name: "⚡ Send Security Event to EDA"
        if: always()
        run: |
          # Send security scan completion event to EDA
          SCAN_STATUS="${{ job.status }}"
          
          curl -X POST "$EDA_ENDPOINT" \
            -H 'Content-Type: application/json' \
            -d '{
              "severity": "'$([ "$SCAN_STATUS" = "success" ] && echo "low" || echo "medium")'" ,
              "summary": "Security scan '${{ matrix.security_tool }}' completed",
              "source": "github-actions-security",
              "environment": "'${{ needs.orchestration-control.outputs.environment }}'",
              "scan_tool": "${{ matrix.security_tool }}",
              "scan_status": "'$SCAN_STATUS'",
              "repository": "'${{ github.repository }}'",
              "workflow_url": "'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'"
            }' || echo "⚠️ EDA notification failed (non-blocking)"

  # 📃 PHASE 3: SBOM & COMPLIANCE
  sbom-generation:
    name: "📃 SBOM Generation & Validation"
    needs: [orchestration-control, security-orchestration]
    if: always() && (needs.security-orchestration.result == 'success' || needs.orchestration-control.outputs.security_required == 'false')
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    
    steps:
      - name: "📋 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: "🌐 Configure AWS OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.orchestration-control.outputs.aws_role_arn }}
          role-session-name: sbom-generation
          aws-region: ${{ env.AWS_REGION }}
          
      - name: "📃 Generate SBOM with Syft"
        run: |
          # Install Syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Generate SBOM in multiple formats
          syft . -o cyclone-dx-json=sbom.cyclonedx.json
          syft . -o spdx-json=sbom.spdx.json
          syft . -o syft-json=sbom.syft.json
          
          echo "📃 SBOM generation complete"
          ls -la sbom.*
          
      - name: "🔍 Vulnerability Scanning with Grype"
        run: |
          # Install Grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Scan SBOM for vulnerabilities
          grype sbom:sbom.syft.json -o json > grype-results.json
          grype sbom:sbom.syft.json -o sarif > grype-results.sarif
          
          # Check for critical vulnerabilities
          CRITICAL_VULNS=$(jq '.matches[] | select(.vulnerability.severity == "Critical") | length' grype-results.json | wc -l)
          HIGH_VULNS=$(jq '.matches[] | select(.vulnerability.severity == "High") | length' grype-results.json | wc -l)
          
          echo "Critical vulnerabilities: $CRITICAL_VULNS"
          echo "High vulnerabilities: $HIGH_VULNS"
          
          # Set outputs for downstream jobs
          echo "critical_vulns=$CRITICAL_VULNS" >> $GITHUB_OUTPUT
          echo "high_vulns=$HIGH_VULNS" >> $GITHUB_OUTPUT
          
      - name: "📊 Upload SBOM & Vulnerability Results"
        run: |
          # Upload to S3 with proper naming
          RESULTS_PATH="sbom-results/${{ needs.orchestration-control.outputs.environment }}/${{ github.run_id }}"
          
          aws s3 cp sbom.cyclonedx.json \
            s3://${{ vars.SBOM_STORAGE_BUCKET || 'devsecops-sbom-storage' }}/$RESULTS_PATH/sbom.cyclonedx.json
          
          aws s3 cp grype-results.json \
            s3://${{ vars.SECURITY_RESULTS_BUCKET || 'devsecops-security-findings' }}/$RESULTS_PATH/grype-results.json
            
      - name: "📡 Upload SBOM Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.orchestration-control.outputs.environment }}-${{ github.run_id }}
          path: |
            sbom.*
            grype-results.*
          retention-days: 30

  # ✅ PHASE 4: COMPLIANCE VALIDATION
  compliance-validation:
    name: "✅ Compliance Validation Framework"
    needs: [orchestration-control, security-orchestration]
    if: always() && (needs.orchestration-control.outputs.compliance_required == 'true' || github.event.inputs.force_compliance == 'true')
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    
    steps:
      - name: "📋 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: "🌐 Configure AWS OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.orchestration-control.outputs.aws_role_arn }}
          role-session-name: compliance-validation
          aws-region: ${{ env.AWS_REGION }}
          
      - name: "✅ SLSA Level 3 Compliance Check"
        run: |
          echo "✅ Running SLSA Level 3 compliance validation..."
          
          # Check build provenance
          PROVENANCE_PRESENT=$([ -f "provenance.json" ] && echo "true" || echo "false")
          
          # Check signed commits (optional)
          SIGNED_COMMITS=$(git log --show-signature -1 | grep -c "Good signature" || echo "0")
          
          # Check SBOM presence
          SBOM_PRESENT=$([ -f "sbom.cyclonedx.json" ] && echo "true" || echo "false")
          
          echo "Build Provenance: $PROVENANCE_PRESENT"
          echo "Signed Commits: $SIGNED_COMMITS"
          echo "SBOM Present: $SBOM_PRESENT"
          
          # Generate compliance report
          cat > compliance-report.json <<EOF
          {
            "framework": "SLSA",
            "level": 3,
            "environment": "${{ needs.orchestration-control.outputs.environment }}",
            "checks": {
              "build_provenance": $PROVENANCE_PRESENT,
              "signed_commits": $([ $SIGNED_COMMITS -gt 0 ] && echo "true" || echo "false"),
              "sbom_generated": $SBOM_PRESENT,
              "source_integrity": true,
              "build_isolation": true
            },
            "compliance_status": "$([ "$PROVENANCE_PRESENT" = "true" ] && [ "$SBOM_PRESENT" = "true" ] && echo "compliant" || echo "partial")"
          }
          EOF
          
          cat compliance-report.json | jq .
          
      - name: "📊 Upload Compliance Report"
        run: |
          RESULTS_PATH="compliance-reports/${{ needs.orchestration-control.outputs.environment }}/${{ github.run_id }}"
          
          aws s3 cp compliance-report.json \
            s3://${{ vars.COMPLIANCE_REPORTS_BUCKET || 'devsecops-compliance-reports' }}/$RESULTS_PATH/compliance-report.json

  # 📈 PHASE 5: SECURITY SUMMARY & REPORTING
  security-summary:
    name: "📈 Security Summary & Reporting"
    needs: [orchestration-control, security-orchestration, sbom-generation, compliance-validation]
    if: always()
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    
    steps:
      - name: "📋 Checkout Repository"
        uses: actions/checkout@v4
        
      - name: "🌐 Configure AWS OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.orchestration-control.outputs.aws_role_arn }}
          role-session-name: security-summary
          aws-region: ${{ env.AWS_REGION }}
          
      - name: "📈 Generate Security Summary Report"
        run: |
          echo "# 🛡️ Enterprise DevSecOps Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.orchestration-control.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AWS Role**: ${{ needs.orchestration-control.outputs.aws_role_arn }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📈 Security Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Orchestration | ${{ needs.security-orchestration.result == 'success' && '✅' || needs.security-orchestration.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.security-orchestration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom-generation.result == 'success' && '✅' || '❌' }} | ${{ needs.sbom-generation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance Validation | ${{ needs.compliance-validation.result == 'success' && '✅' || needs.compliance-validation.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.compliance-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          
      - name: "⚡ Send Summary to EDA"
        if: always()
        run: |
          # Send comprehensive summary to EDA for processing
          OVERALL_STATUS=$([ "${{ needs.security-orchestration.result }}" = "success" ] && \
                          [ "${{ needs.sbom-generation.result }}" = "success" ] && \
                          ([ "${{ needs.compliance-validation.result }}" = "success" ] || [ "${{ needs.compliance-validation.result }}" = "skipped" ]) && \
                          echo "success" || echo "failure")
          
          curl -X POST "$EDA_ENDPOINT" \
            -H 'Content-Type: application/json' \
            -d '{
              "severity": "'$([ "$OVERALL_STATUS" = "success" ] && echo "low" || echo "high")'" ,
              "summary": "Enterprise security orchestration completed",
              "source": "github-actions-summary",
              "environment": "'${{ needs.orchestration-control.outputs.environment }}'",
              "overall_status": "'$OVERALL_STATUS'",
              "security_scan_status": "'${{ needs.security-orchestration.result }}'",
              "sbom_status": "'${{ needs.sbom-generation.result }}'",
              "compliance_status": "'${{ needs.compliance-validation.result }}'",
              "repository": "'${{ github.repository }}'",
              "workflow_url": "'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'"
            }' || echo "⚠️ EDA summary notification failed (non-blocking)"

  # 🏗️ PHASE 6: INFRASTRUCTURE VALIDATION (OPTIMIZED)
  terraform-format-validate:
    name: "🏗️ Terraform Format & Validation"
    needs: [orchestration-control, security-summary]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    
    steps:
      - name: "📋 Checkout Repository"
        uses: actions/checkout@v4
        
      - name: "🌐 Configure AWS OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.orchestration-control.outputs.aws_role_arn }}
          role-session-name: terraform-validation
          aws-region: ${{ env.AWS_REGION }}
          
      - name: "🏗️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          
      - name: "🔧 Terraform Format Check"
        run: |
          echo "🔧 Checking Terraform formatting..."
          if [ -d "terraform" ]; then
            cd terraform
            terraform fmt -check -recursive || {
              echo "⚠️ Terraform formatting issues found"
              terraform fmt -recursive
              echo "✅ Formatting applied"
            }
          else
            echo "⏭️ No Terraform directory found, skipping format check"
          fi
          
      - name: "✅ Terraform Validation"
        run: |
          echo "✅ Validating Terraform configurations..."
          if [ -d "terraform" ]; then
            cd terraform
            
            # Initialize with backend config
            terraform init -backend=false
            
            # Validate configuration
            terraform validate
            
            echo "✅ Terraform validation successful"
          else
            echo "⏭️ No Terraform directory found, skipping validation"
          fi

  # 📋 PHASE 7: FINAL ORCHESTRATION SUMMARY
  orchestration-summary:
    name: "📋 Enterprise Orchestration Summary"
    needs: [
      orchestration-control,
      security-orchestration,
      sbom-generation,
      compliance-validation,
      security-summary,
      terraform-format-validate
    ]
    if: always()
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    
    steps:
      - name: "📈 Generate Comprehensive Summary"
        run: |
          echo "# 🚀 Enterprise DevSecOps Orchestration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Deployment Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.orchestration-control.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy**: ${{ needs.orchestration-control.outputs.deployment_strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "- **AWS Role ARN**: ${{ needs.orchestration-control.outputs.aws_role_arn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Required**: ${{ needs.orchestration-control.outputs.security_required }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Compliance Required**: ${{ needs.orchestration-control.outputs.compliance_required }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Calculate overall success
          SECURITY_OK=$([ "${{ needs.security-orchestration.result }}" = "success" ] || [ "${{ needs.security-orchestration.result }}" = "skipped" ])
          SBOM_OK=$([ "${{ needs.sbom-generation.result }}" = "success" ])
          COMPLIANCE_OK=$([ "${{ needs.compliance-validation.result }}" = "success" ] || [ "${{ needs.compliance-validation.result }}" = "skipped" ])
          SUMMARY_OK=$([ "${{ needs.security-summary.result }}" = "success" ])
          TERRAFORM_OK=$([ "${{ needs.terraform-format-validate.result }}" = "success" ])
          
          if $SECURITY_OK && $SBOM_OK && $COMPLIANCE_OK && $SUMMARY_OK && $TERRAFORM_OK; then
            OVERALL_STATUS="✅ SUCCESS"
            EMOJI="🎉"
          else
            OVERALL_STATUS="⚠️ PARTIAL SUCCESS"
            EMOJI="🔍"
          fi
          
          echo "## $EMOJI Overall Status: $OVERALL_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📈 Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Orchestration Control | ✅ | ${{ needs.orchestration-control.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Orchestration | ${{ needs.security-orchestration.result == 'success' && '✅' || needs.security-orchestration.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.security-orchestration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom-generation.result == 'success' && '✅' || '❌' }} | ${{ needs.sbom-generation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance Validation | ${{ needs.compliance-validation.result == 'success' && '✅' || needs.compliance-validation.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.compliance-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Summary | ${{ needs.security-summary.result == 'success' && '✅' || '❌' }} | ${{ needs.security-summary.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Validation | ${{ needs.terraform-format-validate.result == 'success' && '✅' || '❌' }} | ${{ needs.terraform-format-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 Integration Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- **EDA Webhook**: $EDA_ENDPOINT" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana Dashboard**: $GRAFANA_ENDPOINT" >> $GITHUB_STEP_SUMMARY
          echo "- **Prometheus Metrics**: $PROMETHEUS_ENDPOINT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎆 Next Steps" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$OVERALL_STATUS" == *"SUCCESS"* ]]; then
            echo "1. ✅ All validations passed - ready for deployment" >> $GITHUB_STEP_SUMMARY
            echo "2. 📊 Monitor deployment metrics in Grafana" >> $GITHUB_STEP_SUMMARY
            echo "3. ⚡ EDA automation is active for incident response" >> $GITHUB_STEP_SUMMARY
          else
            echo "1. 🔍 Review failed stages and address issues" >> $GITHUB_STEP_SUMMARY
            echo "2. 📈 Check security findings and compliance reports" >> $GITHUB_STEP_SUMMARY
            echo "3. 🔄 Re-run workflow after fixes are applied" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: "⚡ Final EDA Summary Event"
        if: always()
        run: |
          # Send final orchestration summary to EDA
          FINAL_STATUS="$([ "$OVERALL_STATUS" = "✅ SUCCESS" ] && echo "success" || echo "partial")"
          
          curl -X POST "$EDA_ENDPOINT" \
            -H 'Content-Type: application/json' \
            -d '{
              "severity": "info",
              "summary": "Enterprise orchestration completed - '$FINAL_STATUS'",
              "source": "github-actions-orchestrator-final",
              "environment": "'${{ needs.orchestration-control.outputs.environment }}'",
              "final_status": "'$FINAL_STATUS'",
              "repository": "'${{ github.repository }}'",
              "deployment_ready": '$([ "$FINAL_STATUS" = "success" ] && echo "true" || echo "false")',
              "workflow_url": "'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'"
            }' || echo "⚠️ Final EDA notification failed (non-blocking)"